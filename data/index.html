<!DOCTYPE html>
<html>
<head>
    <title>Pumpkin Audio</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <h1>Pumpkin Audio Control</h1>
    
    <div id="audio-mode">
        <button onclick="switchToMicrophone()" id="btn-microphone">Start Microphone</button>
        <button onclick="switchToFile()" id="btn-file">Stream Audio File</button>
    </div>

    <div id="microphone-section" style="display:none; margin-top: 20px;">
        <p>Streaming microphone audio...</p>
        <button onclick="stopMicrophone()" style="background-color: #ff6b6b;">Stop</button>
    </div>

    <div id="file-section" style="display:none; margin-top: 20px;">
        <input type="file" id="audio-file" accept="audio/*" onchange="onFileSelected(event)">
        <div id="file-status"></div>
        <div style="margin-top: 10px;">
            <button onclick="streamSelectedFile()" id="btn-stream" disabled>Stream File</button>
            <button onclick="stopAudio()" style="background-color: #ff6b6b;">Stop</button>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
